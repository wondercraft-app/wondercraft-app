<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A3478">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WonderCraft">
  <title>WonderCraft 人材管理</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="splash" class="splash">
    <img src="./assets/icon-512.png" alt="WonderCraft">
    <h1>Wonder Craft</h1>
    <p>人材管理システム</p>
  </div>

  <header class="topbar">
    <div class="brand">
      <img src="./assets/header-logo.png" alt="WC">
      <div><small>WonderCraft</small><strong>人材管理</strong></div>
    </div>
    <button id="reloadBtn" class="icon-btn">↻</button>
  </header>

  <main>
    <section id="systemPanel" class="setup-panel system-panel" hidden>
      <h2 id="systemTitle">接続確認中</h2>
      <p id="systemMessage">システムへ接続しています。</p>
      <button id="systemRetryBtn" class="primary">再試行</button>
    </section>

    <section id="appPanel" hidden>
      <section class="dashboard">
        <article><span>求職者</span><strong id="countCandidates">-</strong></article>
        <article><span>案件進捗</span><strong id="countProgress">-</strong></article>
        <article><span>本日の面談</span><strong id="countToday">-</strong></article>
        <article><span>案件待ち</span><strong id="countWaiting">-</strong></article>
      </section>

      <section class="filters">
        <input id="searchInput" type="search" placeholder="名前・駅・会社・進捗を検索">
        <select id="staffFilter"><option value="">担当者：全員</option></select>
        <select id="regionFilter"><option value="">地域：すべて</option></select>
      </section>

      <nav class="tabs">
        <button class="active" data-view="candidates">求職者</button>
        <button data-view="progress">案件進捗</button>
        <button data-view="today">本日の面談</button>
      </nav>

      <div id="status" class="status"></div>
      <section id="cards" class="cards"></section>
    </section>
  </main>

  <div id="modal" class="modal" hidden>
    <div class="backdrop" data-close></div>
    <section class="modal-panel">
      <header><h2 id="modalTitle">編集</h2><button data-close>×</button></header>
      <form id="editForm">
        <div id="formFields" class="form-grid"></div>
        <div id="modalMessage" class="message"></div>
        <footer>
          <button type="button" id="copyProposalBtn" class="secondary">紹介文コピー</button>
          <button type="button" data-close class="secondary">キャンセル</button>
          <button type="submit" class="primary">保存</button>
        </footer>
      </form>
    </section>
  </div>

  <nav class="bottom-nav">
    <button class="active" data-view="candidates">求職者</button>
    <button data-view="progress">案件</button>
    <button data-view="today">面談</button>
    <button id="settingsBtn">設定</button>
  </nav>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
