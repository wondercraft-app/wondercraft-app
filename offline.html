<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0A3478">
  <title>オフライン | WonderCraft</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#F4F7FB;color:#18202A;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
    .card{max-width:420px;margin:20px;padding:28px;border:1px solid #DFE6EE;border-radius:22px;background:#fff;text-align:center;box-shadow:0 10px 30px rgba(20,49,88,.08)}
    img{width:112px;height:112px;border-radius:24px}
    h1{font-size:24px;margin:20px 0 8px}
    p{color:#6B7480;line-height:1.7}
    button{margin-top:12px;padding:12px 18px;border:0;border-radius:12px;color:#fff;background:#0A3478;font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <img src="./assets/icon-192.png" alt="WonderCraft">
    <h1>オフラインです</h1>
    <p>通信環境を確認して、もう一度お試しください。</p>
    <button onclick="location.reload()">再読み込み</button>
  </main>
</body>
</html>
